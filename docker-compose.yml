services:
  bzod:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bzod

    restart: unless-stopped

    ports:
      - "8654:8654"

    volumes:
      - /DATA/AppData/bzod/data:/app/data
      - /DATA/AppData/bzod/config:/app/config

    environment:
      HOST: 0.0.0.0
      PORT: 8654
      DATA_DIR: /app/data
      COOKIE_SECURE: "false"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8654/status"]
      interval: 30s
      timeout: 5s
      retries: 3
